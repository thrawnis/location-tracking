{% comment %}
  Usage: {% include "tracker/partials/star_input.html" with field_name="overall_rating" current_value=form.overall_rating.value label="Overall Rating" %}
{% endcomment %}
<div x-data="{
  value: {{ current_value|default:'0' }},
  hover: 0,
  effective() { return this.hover || this.value; },
  starState(pos) {
    const e = this.effective();
    if (e >= pos) return 'full';
    if (e >= pos - 0.5) return 'half';
    return 'empty';
  },
  set(v) { this.value = (this.value === v) ? 0 : v; }
}" class="flex items-center gap-3">
  <div class="flex items-center gap-0.5">
    <template x-for="i in [1,2,3,4,5]" :key="i">
      <div class="relative w-8 h-8 cursor-pointer select-none" @mouseleave="hover = 0">
        <!-- left-half hover zone -->
        <div class="absolute inset-y-0 left-0 w-1/2 z-10"
             @mouseenter="hover = i - 0.5"
             @click="set(i - 0.5)"></div>
        <!-- right-half hover zone -->
        <div class="absolute inset-y-0 right-0 w-1/2 z-10"
             @mouseenter="hover = i"
             @click="set(i)"></div>
        <!-- full star -->
        <template x-if="starState(i) === 'full'">
          <svg class="w-8 h-8 text-yellow-400 drop-shadow-sm" viewBox="0 0 20 20" fill="currentColor">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
        </template>
        <!-- half star -->
        <template x-if="starState(i) === 'half'">
          <span class="relative inline-block w-8 h-8">
            <svg class="absolute inset-0 w-8 h-8 text-slate-200" viewBox="0 0 20 20" fill="currentColor">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
            <span class="absolute inset-0 overflow-hidden" style="width:50%">
              <svg class="w-8 h-8 text-yellow-400" viewBox="0 0 20 20" fill="currentColor">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            </span>
          </span>
        </template>
        <!-- empty star -->
        <template x-if="starState(i) === 'empty'">
          <svg class="w-8 h-8 text-slate-200 hover:text-slate-300 transition-colors" viewBox="0 0 20 20" fill="currentColor">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
        </template>
      </div>
    </template>
  </div>
  <span class="text-sm text-slate-500 w-20"
        x-text="value ? value + ' / 5' : 'No rating'"></span>
  <!-- Click again on same value to clear -->
  <button type="button" x-show="value > 0" @click="value = 0"
          class="text-xs text-slate-400 hover:text-red-400 transition-colors">Clear</button>
  <input type="hidden" name="{{ field_name }}" :value="value || ''">
</div>

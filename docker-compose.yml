services:
  db:
    image: postgres:16-alpine
    container_name: waypoint-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waypoint}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: waypoint:latest
    build: .
    container_name: waypoint
    ports:
      - "3007:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tracker}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-waypoint}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      HTTPS_ENABLED: ${HTTPS_ENABLED:-False}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data/media:/app/data/media
      - ./data/staticfiles:/app/data/staticfiles
